[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "24"
  NPM_FLAGS = "--prefer-offline"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/view/:id"
  to = "/view.html"
  status = 200

[[redirects]]
  from = "/builder/:id"
  to = "/builder.html"
  status = 200

[[redirects]]
  from = "/share/:token"
  to = "/view.html"
  status = 200
