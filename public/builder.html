<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Builder – Slideshows</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="builder-header">
    <a href="/" class="btn btn-ghost" style="padding:6px 10px;">← Back</a>
    <input id="title-input" class="title-input" type="text" value="Untitled Slideshow" />
    <div class="header-spacer"></div>
    <span id="save-status" class="save-status"></span>
    <button id="share-btn" class="btn btn-ghost" style="display:none" onclick="shareSlideshow()">Share</button>
    <button id="copy-btn" class="btn btn-ghost" style="display:none" onclick="copyLink()">Copy Link</button>
    <a id="view-btn" class="btn btn-ghost" style="display:none" target="_blank">View</a>
    <div class="dropdown" id="export-dropdown" style="display:none">
      <button class="btn btn-ghost" id="export-trigger" onclick="toggleExportMenu()">Export ▾</button>
      <div class="dropdown-menu" id="export-menu" style="display:none">
        <button onclick="exportAs('pptx')">PowerPoint (.pptx)</button>
        <button onclick="exportAs('pdf')">PDF (.pdf)</button>
      </div>
    </div>
    <label class="autosave-label"><input type="checkbox" id="autosave-toggle" checked> Autosave</label>
    <button class="btn btn-primary" onclick="save()">Save</button>
  </header>
  <div class="builder-body">
    <div class="url-section">
      <h3>Add Images &amp; Videos</h3>
      <textarea id="url-input" class="url-input" placeholder="Paste URLs here, one per line&#10;https://example.com/photo.jpg&#10;https://example.com/video.mp4"></textarea>
      <div class="url-actions">
        <button class="btn btn-primary" onclick="addUrls()">Add to Slideshow</button>
        <button class="btn btn-ghost" onclick="document.getElementById('url-input').value=''">Clear</button>
      </div>
    </div>
    <div class="slides-section">
      <h3>Slides <span id="slides-count" class="slides-count"></span></h3>
      <button class="add-slide-btn" onclick="addEmptySlide(0)">+ Add slide at beginning</button>
      <div id="slides-grid" class="slides-grid"></div>
      <button class="add-slide-btn" onclick="addEmptySlide()">+ Add slide at end</button>
    </div>
  </div>
  <div id="share-modal" class="modal-backdrop" style="display:none" onclick="closeShareModal(event)">
    <div class="modal">
      <div class="modal-header">
        <span>Share link</span>
        <button class="modal-close" onclick="closeShareModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="share-url-row">
          <input id="share-url-input" class="share-url-input" type="text" readonly />
          <button class="btn btn-primary" id="share-copy-btn" onclick="copyShareUrl()">Copy</button>
        </div>
        <p class="modal-note">Anyone with this link can view the slideshow but cannot edit it.</p>
      </div>
    </div>
  </div>

  <script src="/builder.js"></script>
  <script src="/exporter.js"></script>
</body>
</html>
